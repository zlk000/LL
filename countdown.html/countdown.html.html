<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易倒计时</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial;}
        body {text-align: center; padding-top: 100px; background: #f5f5f5;}
        #time {font-size: 60px; margin-bottom: 30px; letter-spacing: 3px;}
        button {padding: 10px 25px; font-size: 18px; margin: 0 8px; cursor: pointer;}
    </style>
</head>
<body>
    <div id="time">00:00:00</div>
    <button id="start">开始</button>
    <button id="pause">暂停</button>
    <button id="reset">重置</button>

    <script>
        // 设置倒计时总秒数，这里默认10分钟，可自行修改
        let totalSec = 600;
        let timer = null;
        const timeDom = document.getElementById('time');
        const startBtn = document.getElementById('start');
        const pauseBtn = document.getElementById('pause');
        const resetBtn = document.getElementById('reset');

        // 格式化时分秒
        function formatTime(s) {
            let h = Math.floor(s / 3600);
            let m = Math.floor((s % 3600) / 60);
            let sec = s % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        }

        // 更新显示
        function updateShow() {
            timeDom.innerText = formatTime(totalSec);
        }
        updateShow();

        // 开始
        startBtn.onclick = () => {
            if(timer) return;
            timer = setInterval(()=>{
                totalSec--;
                updateShow();
                if(totalSec <= 0) clearInterval(timer);
            },1000)
        }

        // 暂停
        pauseBtn.onclick = () => {
            clearInterval(timer);
            timer = null;
        }

        // 重置
        resetBtn.onclick = () => {
            clearInterval(timer);
            timer = null;
            totalSec = 600;
            updateShow();
        }
    </script>
</body>
</html>
